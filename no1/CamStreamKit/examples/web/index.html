<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamStreamKit - 流媒体管理</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-hover: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --warning: #f59e0b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-stats {
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .header-stats span { display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-green { background: var(--success); }
        .dot-yellow { background: var(--warning); }
        .main { max-width: 1200px; margin: 0 auto; padding: 32px; }
        .add-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }
        .add-section h2 { font-size: 16px; margin-bottom: 16px; color: var(--text-muted); font-weight: 500; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-row input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-row input:focus { border-color: var(--primary); }
        .form-row input::placeholder { color: var(--text-muted); }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--card-hover); color: var(--text); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { opacity: 0.9; }
        .streams-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .streams-header h2 { font-size: 18px; font-weight: 600; }
        .stream-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
        .stream-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.2s;
        }
        .stream-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .stream-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .stream-id { font-size: 16px; font-weight: 700; }
        .status-badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-online { background: rgba(34,197,94,0.15); color: var(--success); }
        .status-offline { background: rgba(239,68,68,0.15); color: var(--danger); }
        .status-connecting { background: rgba(245,158,11,0.15); color: var(--warning); }
        .stream-info { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
        .info-row .label { min-width: 60px; }
        .info-row .value {
            flex: 1; color: var(--text); word-break: break-all;
            font-family: 'SF Mono','Menlo',monospace; font-size: 12px;
            background: var(--bg); padding: 4px 8px; border-radius: 4px;
        }
        .stream-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .viewer-count { font-size: 13px; color: var(--text-muted); }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state p { font-size: 15px; }
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            padding: 14px 20px; border-radius: 8px;
            font-size: 14px; font-weight: 500;
            z-index: 1000; transform: translateY(100px); opacity: 0;
            transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }

        /* Video player modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 900;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            max-width: 800px;
            width: 90%;
            position: relative;
        }
        .modal-content h3 { margin-bottom: 16px; font-size: 18px; }
        .modal-close {
            position: absolute;
            top: 16px; right: 16px;
            background: none; border: none;
            color: var(--text-muted); font-size: 24px;
            cursor: pointer;
        }
        .modal-close:hover { color: var(--text); }
        #player-video {
            width: 100%;
            background: #000;
            border-radius: 8px;
            min-height: 300px;
        }
        .player-status {
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>CamStreamKit</h1>
        <div class="header-stats">
            <span><span class="dot dot-green"></span><span id="online-count">0</span> 在线</span>
            <span><span class="dot dot-yellow"></span><span id="total-count">0</span> 总计</span>
        </div>
    </div>

    <div class="main">
        <div class="add-section">
            <h2>添加摄像头流</h2>
            <div class="form-row">
                <input type="text" id="input-id" placeholder="流 ID (如: cam1)">
                <input type="text" id="input-url" placeholder="RTSP 地址 (如: rtsp://admin:123456@192.168.1.100/stream1)">
                <button class="btn btn-primary" onclick="addStream()">+ 添加</button>
            </div>
        </div>

        <div class="streams-header">
            <h2>流列表</h2>
            <button class="btn btn-ghost btn-sm" onclick="loadStreams()">刷新</button>
        </div>

        <div id="stream-list" class="stream-grid"></div>
    </div>

    <!-- WebRTC Player Modal -->
    <div class="modal-overlay" id="player-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closePlayer()">&times;</button>
            <h3 id="player-title">播放</h3>
            <video id="player-video" autoplay playsinline muted></video>
            <div class="player-status" id="player-status">等待连接...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const API_BASE = '';
    let streams = [];
    let currentPc = null;

    async function loadStreams() {
        try {
            const resp = await fetch(API_BASE + '/api/v1/streams');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            streams = await resp.json();
            renderStreams();
            updateStats();
        } catch (e) {
            document.getElementById('stream-list').innerHTML =
                '<div class="empty-state" style="grid-column:1/-1"><p>无法连接服务器</p></div>';
        }
    }

    function renderStreams() {
        const c = document.getElementById('stream-list');
        if (!streams.length) {
            c.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p>暂无摄像头流，在上方添加</p></div>';
            return;
        }
        c.innerHTML = streams.map(s => {
            const sc = s.status === 'online' ? 'status-online' : s.status === 'connecting' ? 'status-connecting' : 'status-offline';
            const st = s.status === 'online' ? '在线' : s.status === 'connecting' ? '连接中' : '离线';
            const rtsp = 'rtsp://' + location.hostname + ':554/stream/' + s.id;
            const whep = location.protocol + '//' + location.host + '/whep/' + s.id;
            return `
            <div class="stream-card">
                <div class="stream-card-header">
                    <div class="stream-id">${s.id}</div>
                    <span class="status-badge ${sc}">${st}</span>
                </div>
                <div class="stream-info">
                    <div class="info-row"><span class="label">RTSP</span><span class="value">${rtsp}</span></div>
                    <div class="info-row"><span class="label">WebRTC</span><span class="value">${whep}</span></div>
                    <div class="info-row"><span class="label">GB28181</span><span class="value">${s.gb28181_id || '未注册'}</span></div>
                    <div class="info-row"><span class="label">编码</span><span class="value">${s.codec || 'H264'} | ${s.bitrate_kbps || 0} kbps</span></div>
                </div>
                <div class="stream-footer">
                    <div class="viewer-count">${s.subscribers || 0} 观看</div>
                    <div style="display:flex;gap:8px">
                        <button class="btn btn-success btn-sm" onclick="playStream('${s.id}')">播放</button>
                        <button class="btn btn-ghost btn-sm" onclick="copyUrl('${whep}')">复制</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteStream('${s.id}')">删除</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function updateStats() {
        document.getElementById('online-count').textContent = streams.filter(s => s.status === 'online').length;
        document.getElementById('total-count').textContent = streams.length;
    }

    async function addStream() {
        const id = document.getElementById('input-id').value.trim();
        const url = document.getElementById('input-url').value.trim();
        if (!id || !url) { showToast('请填写 ID 和 URL', 'error'); return; }
        try {
            const r = await fetch(API_BASE + '/api/v1/streams', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, url })
            });
            if (r.ok) {
                document.getElementById('input-id').value = '';
                document.getElementById('input-url').value = '';
                showToast('已添加 ' + id, 'success');
                loadStreams();
            } else {
                const e = await r.json().catch(() => ({}));
                showToast(e.error || '添加失败', 'error');
            }
        } catch (e) { showToast('网络错误', 'error'); }
    }

    async function deleteStream(id) {
        if (!confirm('确认删除 "' + id + '"？')) return;
        try {
            const r = await fetch(API_BASE + '/api/v1/streams/' + id, { method: 'DELETE' });
            if (r.ok || r.status === 204) { showToast('已删除 ' + id, 'success'); loadStreams(); }
            else showToast('删除失败', 'error');
        } catch (e) { showToast('网络错误', 'error'); }
    }

    // WebRTC/WHEP Player
    async function playStream(streamId) {
        closePlayer();

        document.getElementById('player-modal').classList.add('active');
        document.getElementById('player-title').textContent = '播放: ' + streamId;
        document.getElementById('player-status').textContent = '正在建立 WebRTC 连接...';

        try {
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });
            currentPc = pc;

            pc.addTransceiver('video', { direction: 'recvonly' });

            pc.ontrack = (ev) => {
                document.getElementById('player-video').srcObject = ev.streams[0];
                document.getElementById('player-status').textContent = '已连接 - 正在播放';
            };

            pc.oniceconnectionstatechange = () => {
                const state = pc.iceConnectionState;
                if (state === 'connected' || state === 'completed') {
                    document.getElementById('player-status').textContent = '已连接 - 正在播放';
                } else if (state === 'disconnected' || state === 'failed') {
                    document.getElementById('player-status').textContent = '连接断开: ' + state;
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // Wait for ICE gathering to complete
            await new Promise((resolve) => {
                if (pc.iceGatheringState === 'complete') resolve();
                else pc.onicegatheringstatechange = () => {
                    if (pc.iceGatheringState === 'complete') resolve();
                };
                setTimeout(resolve, 3000);
            });

            const resp = await fetch(API_BASE + '/whep/' + streamId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sdp: pc.localDescription.sdp })
            });

            const data = await resp.json();
            if (!resp.ok) {
                document.getElementById('player-status').textContent = '连接失败: ' + (data.error || resp.status);
                return;
            }

            if (!data.sdp) {
                document.getElementById('player-status').textContent = '服务器未返回 SDP';
                return;
            }
            await pc.setRemoteDescription({ type: 'answer', sdp: data.sdp });
            document.getElementById('player-status').textContent = '等待视频流...';

        } catch (e) {
            document.getElementById('player-status').textContent = '错误: ' + e.message;
        }
    }

    function closePlayer() {
        document.getElementById('player-modal').classList.remove('active');
        document.getElementById('player-video').srcObject = null;
        if (currentPc) {
            currentPc.close();
            currentPc = null;
        }
    }

    function copyUrl(u) {
        navigator.clipboard ? navigator.clipboard.writeText(u).then(() => showToast('已复制', 'success'))
            : showToast('复制失败', 'error');
    }

    function showToast(m, t) {
        const el = document.getElementById('toast');
        el.textContent = m;
        el.className = 'toast toast-' + t + ' show';
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    document.getElementById('input-url').addEventListener('keydown', e => { if (e.key === 'Enter') addStream(); });
    document.getElementById('input-id').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('input-url').focus(); });
    document.getElementById('player-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closePlayer(); });

    loadStreams();
    setInterval(loadStreams, 5000);
    </script>
</body>
</html>
