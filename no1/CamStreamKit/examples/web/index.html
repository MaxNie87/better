<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamStreamKit - 流媒体管理</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-hover: #334155;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --warning: #f59e0b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-stats {
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .header-stats span { display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-green { background: var(--success); }
        .dot-yellow { background: var(--warning); }

        /* Main layout */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Add stream form */
        .add-section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }
        .add-section h2 {
            font-size: 16px;
            margin-bottom: 16px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .form-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .form-row input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-row input:focus { border-color: var(--primary); }
        .form-row input::placeholder { color: var(--text-muted); }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--card-hover); color: var(--text); }

        /* Stream list */
        .streams-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .streams-header h2 { font-size: 18px; font-weight: 600; }
        .stream-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }
        .stream-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.2s;
            position: relative;
        }
        .stream-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .stream-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .stream-id {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-online { background: rgba(34,197,94,0.15); color: var(--success); }
        .status-offline { background: rgba(239,68,68,0.15); color: var(--danger); }
        .status-connecting { background: rgba(245,158,11,0.15); color: var(--warning); }

        .stream-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .info-row .label { min-width: 60px; }
        .info-row .value {
            flex: 1;
            color: var(--text);
            word-break: break-all;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 12px;
            background: var(--bg);
            padding: 4px 8px;
            border-radius: 4px;
        }
        .stream-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .viewer-count {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state svg { width: 64px; height: 64px; opacity: 0.5; margin-bottom: 16px; }
        .empty-state p { font-size: 15px; }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }

        /* Loading spinner */
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>CamStreamKit</h1>
        <div class="header-stats">
            <span><span class="dot dot-green"></span> <span id="online-count">0</span> 在线</span>
            <span><span class="dot dot-yellow"></span> <span id="total-count">0</span> 总计</span>
        </div>
    </div>

    <div class="main">
        <div class="add-section">
            <h2>添加摄像头流</h2>
            <div class="form-row">
                <input type="text" id="input-id" placeholder="流 ID (如: cam1, office-door)">
                <input type="text" id="input-url" placeholder="RTSP 地址 (如: rtsp://admin:123456@192.168.1.100/stream1)">
                <button class="btn btn-primary" onclick="addStream()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    添加
                </button>
            </div>
        </div>

        <div class="streams-header">
            <h2>流列表</h2>
            <button class="btn btn-ghost btn-sm" onclick="loadStreams()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                刷新
            </button>
        </div>

        <div id="stream-list" class="stream-grid"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    const API_BASE = window.location.origin;
    let streams = [];

    async function loadStreams() {
        try {
            const resp = await fetch(`${API_BASE}/api/v1/streams`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            streams = await resp.json();
            renderStreams();
            updateHeaderStats();
        } catch (e) {
            console.error('加载失败:', e);
            document.getElementById('stream-list').innerHTML = `
                <div class="empty-state">
                    <p>无法连接服务器 (${API_BASE})</p>
                    <p style="margin-top: 8px; font-size: 13px;">请确认 CamStreamKit 正在运行</p>
                </div>`;
        }
    }

    function renderStreams() {
        const container = document.getElementById('stream-list');
        if (streams.length === 0) {
            container.innerHTML = `
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    <p>暂无摄像头流</p>
                    <p style="margin-top: 8px; font-size: 13px;">在上方添加第一个 RTSP 摄像头开始使用</p>
                </div>`;
            return;
        }

        container.innerHTML = streams.map(s => {
            const statusClass = s.status === 'online' ? 'status-online'
                : s.status === 'connecting' ? 'status-connecting' : 'status-offline';
            const statusText = s.status === 'online' ? '在线'
                : s.status === 'connecting' ? '连接中' : '离线';
            const rtspUrl = `rtsp://${location.hostname}:554/stream/${s.id}`;
            const viewers = s.subscribers || 0;

            return `
            <div class="stream-card">
                <div class="stream-card-header">
                    <div class="stream-id">${s.id}</div>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </div>
                <div class="stream-info">
                    <div class="info-row">
                        <span class="label">源地址</span>
                        <span class="value">${s.url || '-'}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">播放地址</span>
                        <span class="value">${rtspUrl}</span>
                    </div>
                    <div class="info-row">
                        <span class="label">编码</span>
                        <span class="value">${s.codec || 'H.264'}</span>
                    </div>
                </div>
                <div class="stream-footer">
                    <div class="viewer-count">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        ${viewers} 观看
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-ghost btn-sm" onclick="copyUrl('${rtspUrl}')" title="复制播放地址">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            复制
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="deleteStream('${s.id}')">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                <path d="M10 11v6"/><path d="M14 11v6"/>
                            </svg>
                            删除
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function updateHeaderStats() {
        const online = streams.filter(s => s.status === 'online').length;
        document.getElementById('online-count').textContent = online;
        document.getElementById('total-count').textContent = streams.length;
    }

    async function addStream() {
        const idInput = document.getElementById('input-id');
        const urlInput = document.getElementById('input-url');
        const id = idInput.value.trim();
        const url = urlInput.value.trim();

        if (!id) { showToast('请输入流 ID', 'error'); idInput.focus(); return; }
        if (!url) { showToast('请输入 RTSP 地址', 'error'); urlInput.focus(); return; }

        try {
            const resp = await fetch(`${API_BASE}/api/v1/streams`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, url })
            });
            if (resp.ok) {
                idInput.value = '';
                urlInput.value = '';
                showToast(`已添加 ${id}`, 'success');
                loadStreams();
            } else {
                const err = await resp.json().catch(() => ({}));
                showToast(err.error || `添加失败 (HTTP ${resp.status})`, 'error');
            }
        } catch (e) {
            showToast('网络错误: ' + e.message, 'error');
        }
    }

    async function deleteStream(id) {
        if (!confirm(`确认删除流 "${id}"？`)) return;
        try {
            const resp = await fetch(`${API_BASE}/api/v1/streams/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                showToast(`已删除 ${id}`, 'success');
                loadStreams();
            } else {
                showToast('删除失败', 'error');
            }
        } catch (e) {
            showToast('网络错误: ' + e.message, 'error');
        }
    }

    function copyUrl(url) {
        navigator.clipboard.writeText(url).then(() => {
            showToast('已复制到剪贴板', 'success');
        }).catch(() => {
            const input = document.createElement('input');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast('已复制到剪贴板', 'success');
        });
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast toast-${type} show`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Enter key support
    document.getElementById('input-url').addEventListener('keydown', e => {
        if (e.key === 'Enter') addStream();
    });
    document.getElementById('input-id').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('input-url').focus();
    });

    loadStreams();
    setInterval(loadStreams, 5000);
    </script>
</body>
</html>
